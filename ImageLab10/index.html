<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
    <a-assets>
      <img id="sky" src="twirlpinksky.jpg">
      <img id="cone" src="texture3.jpg">
      <img id="ball" src="BeachBallTexture2.jpg">
    </a-assets>
      <a-sphere position="-2 2 -5" radius="1" src="#ball"></a-sphere>
      <a-sphere position="1 1.25 -3" radius=".6" color="#FFB6C1"></a-sphere>
      <a-cylinder position="1 .9 -3" radius=".73" height=".2" color="#FFB6C1"></a-cylinder>
      <a-cone position="1 0.25 -3" color="#CDA26F" radius-bottom="0" radius-top=".5" src="#cone"></a-cone>      
      <a-sky src="#sky"></a-sky>
    </a-scene>
  </body>
</html>
